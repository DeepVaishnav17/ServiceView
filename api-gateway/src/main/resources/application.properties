spring.application.name=api-gateway

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=TRACE

eureka.client.service-url.defaultZone=${EUREKA_URL:http://discovery-server:8761/eureka}

spring.cloud.gateway.server.webflux.routes[0].id=product-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/product/**

spring.cloud.gateway.server.webflux.routes[1].id=order-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/order/**

spring.cloud.gateway.server.webflux.routes[2].id=auth-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[3].id=notification-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://NOTIFICATION
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/notification/**

spring.cloud.gateway.server.webflux.routes[4].id=inventory-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/inventory/**
